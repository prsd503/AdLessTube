<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Search Player</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 1000px;
    margin: auto;
}

.search-box {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

input {
    flex: 1;
    padding: 12px;
    font-size: 16px;
}

button {
    padding: 12px 20px;
    cursor: pointer;
}

#results {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
    gap: 15px;
    margin-top: 20px;
}

.video {
    cursor: pointer;
}

.video img {
    width: 100%;
    border-radius: 8px;
}

iframe {
    width: 100%;
    aspect-ratio: 16/9;
    border: none;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="container">

<h2>YouTube Search Player</h2>

<div class="search-box">
<input id="query" placeholder="Search YouTube...">
<button onclick="search()">Search</button>
</div>

<div id="player"></div>

<div id="results"></div>

</div>

<script>

const API_KEY = "YOUR_API_KEY";

async function search() {

const q = document.getElementById("query").value;

const url =
`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=12&q=${encodeURIComponent(q)}&key=${API_KEY}`;

const res = await fetch(url);

const data = await res.json();

const results = document.getElementById("results");
results.innerHTML = "";

data.items.forEach(item=>{

const div=document.createElement("div");
div.className="video";

div.innerHTML=`
<img src="${item.snippet.thumbnails.medium.url}">
<h4>${item.snippet.title}</h4>
`;

div.onclick=()=>play(item.id.videoId);

results.appendChild(div);

});

}

function play(videoId){

document.getElementById("player").innerHTML=`
<iframe
src="https://www.youtube.com/embed/${videoId}"
allowfullscreen
allow="autoplay; encrypted-media">
</iframe>
`;

}

</script>

</body>
</html>
