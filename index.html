 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AdLessTube - Premium Privacy Proxy</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #09070f 0%, #110922 40%, #05020a 100%);
      --surface-color: rgba(28, 18, 54, 0.45);
      --surface-border: rgba(255, 255, 255, 0.07);
      --accent-glow: linear-gradient(90deg, #00f2fe, #4facfe);
      --neon-magenta: #ff007f;
      --neon-cyan: #00f3ff;
      --action-gradient: linear-gradient(135deg, #ec008c 0%, #fc6767 100%);
      --text-main: #ffffff;
      --text-muted: #9d93be;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #search-view {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      justify-content: center;
      padding: 20px;
      transition: justify-content 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #search-view.active {
      justify-content: flex-start;
      padding-top: 20px;
    }

    .search-wrapper {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      text-align: center;
    }

    .app-brand { margin-bottom: 8px; }
    .app-brand h1 {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 30%, var(--neon-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .app-brand span { color: var(--neon-magenta); font-weight: 300; }

    .disclaimer-banner {
      background: rgba(0, 243, 255, 0.05);
      border: 1px solid rgba(0, 243, 255, 0.15);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.8rem;
      color: #9defff;
      line-height: 1.4;
      margin-bottom: 24px;
      max-width: 440px;
      margin-left: auto;
      margin-right: auto;
    }

    .input-group {
      display: flex;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--surface-border);
      border-radius: 40px;
      padding: 5px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .input-group:focus-within {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 18px rgba(0, 243, 255, 0.25);
    }

    .input-group input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 12px 20px;
      color: white;
      font-size: 16px;
      outline: none;
    }

    .input-group button {
      background: var(--accent-glow);
      color: #05020a;
      border: none;
      padding: 0 26px;
      border-radius: 35px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
    }

    #results {
      padding: 10px 4px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 540px;
      margin: 25px auto 0 auto;
    }

    .video-card {
      background: var(--surface-color);
      border: 1px solid var(--surface-border);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }

    .thumbnail-box {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background-color: #020105;
    }

    .thumbnail-box img { width: 100%; height: 100%; object-fit: cover; }
    .video-info { padding: 16px; }
    .video-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 6px;
      color: #ffffff;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .video-author { font-size: 12px; color: var(--neon-cyan); font-weight: 700; }
    .status-msg { text-align: center; padding: 50px 20px; color: var(--text-muted); font-size: 14px; }

    #player-view {
      display: none;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      width: 100%;
    }

    .player-header {
      width: 100%;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      background: rgba(15, 10, 30, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--surface-border);
    }

    .native-player-container {
      width: 100%;
      max-width: 800px;
      aspect-ratio: 16 / 9;
      background: #000;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }

    .native-player-container video { width: 100%; height: 100%; outline: none; }
    .video-details-box { width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box; text-align: center; }
    .video-details-box h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; color: #fff; text-align: left; }
    .video-details-box p { color: var(--neon-cyan); font-size: 0.9rem; font-weight: 600; text-align: left; margin-bottom: 25px; }

    .fallback-btn {
      display: inline-block;
      width: 100%;
      max-width: 340px;
      padding: 14px 20px;
      background: var(--action-gradient);
      color: white;
      text-decoration: none;
      font-weight: 700;
      border-radius: 30px;
      font-size: 0.95rem;
      box-shadow: 0 6px 20px rgba(236, 0, 140, 0.3);
      margin-top: 10px;
    }

    .back-btn-top {
      color: var(--text-main);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>

  <div id="search-view">
    <div class="search-wrapper">
      <div class="app-brand"><h1>AdLess<span>Tube</span></h1></div>
      <div class="disclaimer-banner">Using high-availability CORS-permissive search relays.</div>
      <header class="input-group">
        <input type="text" id="search-query" placeholder="Search videos...">
        <button id="search-btn">EXPLORE</button>
      </header>
    </div>
    <div id="results"><div class="status-msg">Enter a video keyword to initialize streaming pathways...</div></div>
  </div>

  <div id="player-view">
    <div class="player-header"><span class="back-btn-top" onclick="showSearchView()">← Back to Search</span></div>
    <div class="native-player-container"><video id="nativeVideoPlayer" controls autoplay playsinline></video></div>
    <div class="video-details-box">
      <h2 id="playerVideoTitle">Loading stream...</h2>
      <p id="playerVideoAuthor">Connecting...</p>
      <a href="#" id="externalFallbackLink" class="fallback-btn" target="_blank">External Clean Stream</a>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    // High availability CORS-relaxed Piped nodes used to fetch search results smoothly
    const SEARCH_NODES = [
      "https://pipedapi.kavin.rocks",
      "https://piped-api.lunar.icu",
      "https://api.piped.privacydev.net",
      "https://pipedapi.tokhmi.xyz"
    ];

    // Extraction backend nodes for decoding direct files
    const STREAM_NODES = [
      "https://api.piped.privacydev.net",
      "https://pipedapi.kavin.rocks",
      "https://yewtu.be"
    ];
    
    let activeSearchIndex = 0;
    let activeStreamIndex = 0;
    let currentVideoId = "";
    let currentTitle = "";
    let currentAuthor = "";

    const searchView = document.getElementById('search-view');
    const playerView = document.getElementById('player-view');
    const searchInput = document.getElementById('search-query');
    const searchBtn = document.getElementById('search-btn');
    const resultsContainer = document.getElementById('results');
    const nativeVideoPlayer = document.getElementById('nativeVideoPlayer');
    const playerVideoTitle = document.getElementById('playerVideoTitle');
    const playerVideoAuthor = document.getElementById('playerVideoAuthor');
    const externalFallbackLink = document.getElementById('externalFallbackLink');

    searchBtn.addEventListener('click', performSearch);
    searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });

    nativeVideoPlayer.addEventListener('error', () => {
      console.warn("Stream failed mid-load. Attempting alternate engine stream...");
      tryNextStreamNode();
    });

    async function performSearch() {
      const query = encodeURIComponent(searchInput.value.trim());
      if (!query) return;

      searchView.classList.add('active');
      resultsContainer.innerHTML = '<div class="status-msg" style="color: var(--neon-cyan);">Connecting to query engines...</div>';
      
      // Cycle through relaxed CORS endpoints to handle GitHub Pages execution
      for (let i = 0; i < SEARCH_NODES.length; i++) {
        const node = SEARCH_NODES[activeSearchIndex];
        try {
          const response = await fetch(`${node}/search?q=${query}&filter=videos`);
          if (response.ok) {
            const data = await response.json();
            if (data && data.streams && data.streams.length > 0) {
              displayResults(data.streams);
              return;
            }
          }
        } catch (e) {
          console.warn(`Search error at ${node}, rotating...`);
        }
        activeSearchIndex = (activeSearchIndex + 1) % SEARCH_NODES.length;
      }

      resultsContainer.innerHTML = '<div class="status-msg" style="color:var(--neon-magenta);">All search relays busy. Please try clicking EXPLORE again.</div>';
    }

    function displayResults(streams) {
      resultsContainer.innerHTML = "";
      
      streams.forEach(video => {
        // Extract parameters safely
        const id = video.url ? video.url.split("?v=")[1] : null;
        if (!id) return;

        const title = video.title;
        const author = video.uploaderName || 'Independent Source';
        const thumbUrl = video.thumbnail || `https://img.youtube.com/vi/${id}/mqdefault.jpg`;

        const card = document.createElement('div');
        card.className = 'video-card';

        card.innerHTML = `
          <div class="thumbnail-box"><img src="${thumbUrl}" alt="cover" loading="lazy"></div>
          <div class="video-info">
            <div class="video-title">${title}</div>
            <div class="video-author">⚡ ${author}</div>
          </div>
        `;
        card.addEventListener('click', () => {
          activeStreamIndex = 0;
          showPlayerView(id, title, author);
        });
        resultsContainer.appendChild(card);
      });
    }

    function showPlayerView(videoId, title, author) {
      currentVideoId = videoId;
      currentTitle = title;
      currentAuthor = author;

      playerVideoTitle.textContent = title;
      playerVideoAuthor.textContent = `⚡ Allocating active proxy pipeline...`;
      
      // Build dynamic fallback
      externalFallbackLink.href = `https://piped.video/watch?v=${videoId}`;
      
      searchView.style.display = 'none';
      playerView.style.display = 'flex';
      window.scrollTo(0, 0);

      loadStreamUrl(videoId);
    }

    async function loadStreamUrl(videoId) {
      if (activeStreamIndex >= STREAM_NODES.length) {
        handleFinalFallback();
        return;
      }

      const node = STREAM_NODES[activeStreamIndex];
      playerVideoAuthor.textContent = `⚡ Synchronizing decryptors via node [${activeStreamIndex + 1}]...`;

      try {
        if (node.includes("api.piped") || node.includes("pipedapi")) {
          // Process Piped Stream Format
          const response = await fetch(`${node}/streams/${videoId}`);
          if (response.ok) {
            const data = await response.json();
            if (data.videoStreams && data.videoStreams.length > 0) {
              const stream = data.videoStreams.find(s => s.videoOnly === false) || data.videoStreams[0];
              if (stream && stream.url) {
                playerVideoAuthor.textContent = `⚡ ${currentAuthor}`;
                nativeVideoPlayer.src = stream.url;
                return;
              }
            }
          }
        } else {
          // Process Invidious Stream Format
          const response = await fetch(`${node}/api/v1/videos/${videoId}`);
          if (response.ok) {
            const data = await response.json();
            if (data && data.formatStreams && data.formatStreams.length > 0) {
              playerVideoAuthor.textContent = `⚡ ${currentAuthor}`;
              nativeVideoPlayer.src = data.formatStreams[0].url;
              return;
            }
          }
        }
        tryNextStreamNode();
      } catch (err) {
        tryNextStreamNode();
      }
    }

    function tryNextStreamNode() {
      activeStreamIndex++;
      loadStreamUrl(currentVideoId);
    }

    function handleFinalFallback() {
      nativeVideoPlayer.removeAttribute('src');
      nativeVideoPlayer.load();
      playerVideoAuthor.textContent = "Direct streaming restricted on this node. Please click 'External Clean Stream' below to view instantly.";
    }

    function showSearchView() {
      nativeVideoPlayer.pause();
      nativeVideoPlayer.removeAttribute('src'); 
      nativeVideoPlayer.load();
      playerView.style.display = 'none';
      searchView.style.display = 'flex';
      searchView.classList.remove('active');
      resultsContainer.innerHTML = '<div class="status-msg">Enter a video keyword to initialize streaming pathways...</div>';
      searchInput.value = '';
    }
  </script>
</body>
</html>
